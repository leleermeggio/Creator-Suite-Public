# backend/docker-compose.yml
version: "3.8"

services:
  api:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./keys:/app/backend/keys:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: creator
      POSTGRES_PASSWORD: creator
      POSTGRES_DB: creator_suite
    # No host port binding — only reachable within Docker network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creator -d creator_suite"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_local}
    # No host port binding — only reachable within Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_local}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./keys:/app/backend/keys:ro

volumes:
  pgdata:
