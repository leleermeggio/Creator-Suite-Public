services:
  # ── DB Migration (runs once on deploy, exits) ─────────────────────────────
  migrate:
    build: ./backend
    command: alembic upgrade head
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://creator:creator@postgres:5432/creator_suite
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: ./backend/.env
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://app.creatorzone.duckdns.org,https://api.creatorzone.duckdns.org}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # Override .env localhost refs with Docker service names
      - DATABASE_URL=postgresql+asyncpg://creator:creator@postgres:5432/creator_suite
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_local}@redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/keys:/app/backend/keys:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: ./backend/.env
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # Override .env localhost refs with Docker service names
      - DATABASE_URL=postgresql+asyncpg://creator:creator@postgres:5432/creator_suite
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_local}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/keys:/app/backend/keys:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: creator
      POSTGRES_PASSWORD: creator
      POSTGRES_DB: creator_suite
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creator -d creator_suite"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_local}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_local}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Caddy Reverse Proxy (auto-HTTPS via DuckDNS) ──────────────────────────
  caddy:
    build:
      context: .
      dockerfile: caddy.Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DUCKDNS_DOMAIN=${DUCKDNS_DOMAIN}
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    depends_on:
      - api
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Frontend (Expo Web) ───────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "127.0.0.1:8081:8081"
    command: sh -c "npm install && npx expo start --web --port 8081"
    environment:
      - EXPO_NO_DOTENV=1
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Telegram Bot ──────────────────────────────────────────────────────────
  # Run with: docker compose --profile bot up -d
  creatorzone-bot:
    profiles: ["bot"]
    build: .
    container_name: creatorzone-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./cookies:/app/cookies:ro
      - ./logs:/app/logs
      - ./audio:/app/audio
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  pgdata:
  caddy_data:
  caddy_config:
